<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    .primary-color { fill: #4A90E2; }
    .secondary-color { fill: #50E3C2; }
    .accent-color { fill: #F5A623; }
    .neutral-dark { fill: #333333; }
    .neutral-light { fill: #E0E0E0; }
    .text-color { fill: #333333; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#F8F9FA"/>

  <!-- Title Area -->
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" class="text-color">
    AI Historical Fashion Re-creation
  </text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" class="text-color">
    Your Gateway to the Past, Digitally Reimagined
  </text>

  <!-- Main Illustration Area -->
  <g transform="translate(100, 170)">

    <!-- AI Brain/Core Icon -->
    <g transform="translate(100, 150)">
      <circle cx="50" cy="50" r="40" class="primary-color"/>
      <path d="M50,10 C30.67,10 10,30.67 10,50 C10,69.33 30.67,90 50,90 C69.33,90 90,69.33 90,50 C90,30.67 69.33,10 50,10 Z M50,30 C61.05,30 70,38.95 70,50 C70,61.05 61.05,70 50,70 C38.95,70 30,61.05 30,50 C30,38.95 38.95,30 50,30 Z M50,45 C58.28,45 65,51.72 65,60 C65,68.28 58.28,75 50,75 C41.72,75 35,68.28 35,60 C35,51.72 41.72,45 50,45 Z" class="secondary-color" opacity="0.8"/>
      <circle cx="50" cy="50" r="15" class="accent-color"/>
      <circle cx="50" cy="50" r="5" class="neutral-dark"/>
    </g>

    <!-- Connecting Lines -->
    <line x1="190" y1="190" x2="300" y2="180" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5"/>
    <line x1="190" y1="240" x2="300" y2="260" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5"/>

    <!-- Historical Garment Icon (e.g., a simplified Elizabethan collar) -->
    <g transform="translate(350, 150)">
      <path d="M50,0 L20,40 L80,40 Z M20,40 L0,70 L50,50 L100,70 L80,40 Z M50,50 L30,80 L70,80 Z" fill="#A78B7A" opacity="0.9"/>
      <rect x="40" y="10" width="20" height="10" fill="#D4AC0D" opacity="0.7"/>
    </g>

    <!-- Connecting Lines -->
    <line x1="450" y1="180" x2="550" y2="190" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5"/>
    <line x1="450" y1="260" x2="550" y2="240" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5"/>

    <!-- Modern Garment Icon (e.g., a simplified modern dress silhouette) -->
    <g transform="translate(600, 150)">
      <path d="M50,0 L20,20 L30,80 L70,80 L80,20 Z" fill="#E91E63" opacity="0.9"/>
      <circle cx="50" cy="20" r="10" fill="#FFFFFF" opacity="0.7"/>
    </g>

    <!-- Text Labels -->
    <text x="150" y="300" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" class="text-color">
      Historical Data
    </text>
    <text x="400" y="300" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" class="text-color">
      AI Analysis & Re-creation
    </text>
    <text x="650" y="300" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" class="text-color">
      Digital Fashion
    </text>

  </g>

  <!-- Feature Icons -->
  <g transform="translate(100, 400)">
    <!-- Icon: Magnifying Glass -->
    <g transform="translate(0, 0)">
      <circle cx="30" cy="30" r="25" stroke="#4A90E2" stroke-width="4" fill="none"/>
      <line x1="50" y1="50" x2="70" y2="70" stroke="#4A90E2" stroke-width="4"/>
      <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" class="text-color">Research</text>
    </g>

    <!-- Icon: 3D Cube/Model -->
    <g transform="translate(180, 0)">
      <rect x="10" y="10" width="40" height="40" fill="#50E3C2" opacity="0.8"/>
      <rect x="20" y="20" width="40" height="40" fill="#FFFFFF" opacity="0.6"/>
      <rect x="30" y="30" width="40" height="40" fill="#F5A623" opacity="0.5"/>
      <text x="40" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" class="text-color">Modeling</text>
    </g>

    <!-- Icon: Magic Wand/Sparkles -->
    <g transform="translate(360, 0)">
      <path d="M30,0 L0,30 L30,20 L60,30 Z" fill="#F5A623"/>
      <circle cx="30" cy="40" r="10" fill="#F5A623" opacity="0.8"/>
      <circle cx="30" cy="40" r="5" fill="#FFFFFF" opacity="0.7"/>
      <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" class="text-color">Re-creation</text>
    </g>

    <!-- Icon: Play Button/Arrow -->
    <g transform="translate(540, 0)">
      <polygon points="30,0 60,30 30,60" fill="#4A90E2"/>
      <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" class="text-color">Visualize</text>
    </g>

    <!-- Icon: Gear/Settings -->
    <g transform="translate(720, 0)">
      <circle cx="30" cy="30" r="25" stroke="#333333" stroke-width="4" fill="none"/>
      <circle cx="30" cy="15" r="4" fill="#333333"/>
      <circle cx="48" cy="30" r="4" fill="#333333"/>
      <circle cx="30" cy="45" r="4" fill="#333333"/>
      <circle cx="12" cy="30" r="4" fill="#333333"/>
      <text x="30" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" class="text-color">Customization</text>
    </g>
  </g>

</svg>